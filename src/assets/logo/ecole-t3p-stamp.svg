<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- ECOLE T3P - Vintage Stamp Effect -->
  <defs>
    <!-- Distressed texture filter -->
    <filter id="stampTexture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  
  <!-- Main stamp container - slightly rotated for authenticity -->
  <g transform="rotate(-3 60 60)" filter="url(#roughEdge)">
    <!-- Outer ring -->
    <circle cx="60" cy="60" r="55" fill="none" stroke="#1B4D3E" stroke-width="4"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#1B4D3E" stroke-width="2"/>
    
    <!-- Decorative dots around the circle -->
    <g fill="#1B4D3E">
      <circle cx="60" cy="8" r="2"/>
      <circle cx="60" cy="112" r="2"/>
      <circle cx="8" cy="60" r="2"/>
      <circle cx="112" cy="60" r="2"/>
      <circle cx="23" cy="23" r="1.5"/>
      <circle cx="97" cy="23" r="1.5"/>
      <circle cx="23" cy="97" r="1.5"/>
      <circle cx="97" cy="97" r="1.5"/>
    </g>
    
    <!-- Inner decorative ring -->
    <circle cx="60" cy="60" r="42" fill="none" stroke="#1B4D3E" stroke-width="1" stroke-dasharray="3 2"/>
    
    <!-- ECOLE text curved on top -->
    <path id="topArc" d="M 20 60 A 40 40 0 0 1 100 60" fill="none"/>
    <text font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="11" font-weight="800" fill="#1B4D3E" letter-spacing="0.15em">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">ÉCOLE</textPath>
    </text>
    
    <!-- T3P main text -->
    <text x="60" y="68" text-anchor="middle" font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="28" font-weight="900" fill="#1B4D3E" letter-spacing="-0.02em">T3P</text>
    
    <!-- Road symbol -->
    <path d="M35 78 L60 68 L85 78" stroke="#D4A853" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="60" cy="68" r="3" fill="#D4A853"/>
    
    <!-- FORMATION curved on bottom -->
    <path id="bottomArc" d="M 20 60 A 40 40 0 0 0 100 60" fill="none"/>
    <text font-family="Plus Jakarta Sans, Arial, sans-serif" font-size="8" font-weight="600" fill="#1B4D3E" letter-spacing="0.1em">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">FORMATION TAXI • VTC</textPath>
    </text>
    
    <!-- Stars decoration -->
    <text x="25" y="62" font-size="8" fill="#D4A853">★</text>
    <text x="90" y="62" font-size="8" fill="#D4A853">★</text>
  </g>
</svg>