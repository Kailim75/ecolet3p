<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 50" fill="none">
  <!-- T3P Campus - Horizontal Compact Version -->
  <defs>
    <linearGradient id="goldGradientH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4BE73"/>
      <stop offset="100%" style="stop-color:#C49843"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Circle -->
  <circle cx="25" cy="25" r="23" fill="#1B4D3E"/>
  <circle cx="25" cy="25" r="19" fill="none" stroke="url(#goldGradientH)" stroke-width="1.5"/>
  
  <!-- T3P Text in Circle -->
  <text x="25" y="22" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="11" font-weight="900" fill="#F5EBD7">T3P</text>
  
  <!-- Road Symbol -->
  <path d="M14 32 L25 27 L36 32" stroke="#D4A853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="25" cy="27" r="1.5" fill="#D4A853"/>
  
  <!-- T3P CAMPUS Text -->
  <text x="60" y="30" font-family="Plus Jakarta Sans, sans-serif" font-size="24" font-weight="900" fill="#1B4D3E" letter-spacing="-0.02em">T3P</text>
  <text x="112" y="30" font-family="Plus Jakarta Sans, sans-serif" font-size="24" font-weight="700" fill="#1B4D3E" letter-spacing="-0.02em">CAMPUS</text>
</svg>