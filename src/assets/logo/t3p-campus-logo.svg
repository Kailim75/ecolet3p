<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- T3P Campus - Full Logo -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4BE73"/>
      <stop offset="100%" style="stop-color:#C49843"/>
    </linearGradient>
  </defs>
  
  <!-- Icon Circle -->
  <circle cx="30" cy="30" r="28" fill="#1B4D3E"/>
  <circle cx="30" cy="30" r="24" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- T3P Text in Circle -->
  <text x="30" y="26" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="900" fill="#F5EBD7">T3P</text>
  
  <!-- Road/Path Symbol -->
  <path d="M18 38 L30 32 L42 38" stroke="#D4A853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="30" cy="32" r="2" fill="#D4A853"/>
  
  <!-- CAMPUS Text -->
  <text x="70" y="28" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="900" fill="#1B4D3E" letter-spacing="-0.02em">T3P</text>
  <text x="130" y="28" font-family="Plus Jakarta Sans, sans-serif" font-size="28" font-weight="700" fill="#1B4D3E" letter-spacing="-0.02em">CAMPUS</text>
  
  <!-- Tagline -->
  <text x="70" y="48" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#6B6B6B" letter-spacing="0.1em">FORMATION TAXI • VTC • VMDTR</text>
</svg>