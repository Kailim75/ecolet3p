  <circle cx="30" cy="30" r="28" fill="#FFFFFF"/>
  
  <!-- Inner Ring -->
  <circle cx="30" cy="30" r="24" fill="none" stroke="#1B4D3E" stroke-width="2" opacity="0.2"/>
  
  <!-- T3P Text -->
  <text x="30" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="900" fill="#1B4D3E" letter-spacing="-0.02em">T3P</text>
  
