<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <!-- T3P Campus - Icon Only -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E4BE73"/>
      <stop offset="100%" style="stop-color:#C49843"/>
    </linearGradient>
  </defs>
  
  <!-- Main Circle -->
  <circle cx="30" cy="30" r="28" fill="#1B4D3E"/>
  
  <!-- Gold Ring -->
  <circle cx="30" cy="30" r="24" fill="none" stroke="url(#goldGradient)" stroke-width="2"/>
  
  <!-- T3P Text -->
  <text x="30" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="16" font-weight="900" fill="#F5EBD7" letter-spacing="-0.02em">T3P</text>
  
  <!-- Road/Path Symbol - Represents journey/destination -->
  <path d="M16 40 L30 33 L44 40" stroke="#D4A853" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="30" cy="33" r="2.5" fill="#D4A853"/>
</svg>