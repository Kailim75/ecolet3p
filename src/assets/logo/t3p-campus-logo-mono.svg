  <circle cx="30" cy="30" r="24" fill="none" stroke="#1B4D3E" stroke-width="2" opacity="0.3"/>
  
  <!-- T3P Text in Circle -->
  <text x="30" y="26" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="14" font-weight="900" fill="#FFFFFF">T3P</text>
  
